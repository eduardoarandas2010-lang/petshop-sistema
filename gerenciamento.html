<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento PetShop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="sidebar">
    <h2><i class="fa-solid fa-paw"></i> PetShop</h2>

    <ul>
      <li><i class="fa-solid fa-house"></i> Dashboard</li>
      <li><i class="fa-solid fa-user"></i> Clientes</li>
      <li><i class="fa-solid fa-dog"></i> Pets</li>
      <li><i class="fa-solid fa-calendar"></i> Agendamentos</li>
      <li><i class="fa-solid fa-scissors"></i> Serviços</li>
      <li><i class="fa-solid fa-money-bill"></i> Pagamentos</li>
      <li><i class="fa-solid fa-chart-line"></i> Relatórios</li>
    </ul>
  </div>

  <div class="main-content">
    <div class="header">
      <h1><i class="fa-solid fa-paw"></i> Painel de Gerenciamento</h1>
      <button id="logoutBtn">Sair</button>
    </div>

    <div class="cards">
      <div class="card form-card">
        <h3>Clientes</h3>
        <input type="text" id="clienteNome" placeholder="Nome do cliente">
        <input type="text" id="clienteTelefone" placeholder="Telefone">
      </div>

      <div class="card form-card">
        <h3>Pets</h3>
        <input type="text" id="petNome" placeholder="Nome do pet">
        <input type="text" id="petTipo" placeholder="Tipo do pet">
      </div>

      <div class="card form-card">
        <h3>Agendamentos</h3>
        <input type="date" id="agendamentoData">
        <input type="time" id="agendamentoHora">
      </div>

      <div class="card form-card">
        <h3>Serviços</h3>
        <select id="servico">
          <option value="">Selecione um serviço</option>
          <option>Banho</option>
          <option>Tosa</option>
          <option>Consulta</option>
          <option>Vacinação</option>
          <option>Hospedagem</option>
        </select>
      </div>

      <div class="card form-card">
        <h3>Pagamento</h3>
        <input type="number" id="valorPagamento" placeholder="Valor">
        <select id="formaPagamento">
          <option value="">Forma de pagamento</option>
          <option>Pix</option>
          <option>Cartão de Débito</option>
          <option>Cartão de Crédito</option>
          <option>Dinheiro</option>
        </select>
      </div>
    </div>

    <div class="save-area">
      <button id="salvarTudoBtn">Salvar Todas as Informações</button>
    </div>

    <div class="dados-salvos">
      <h2>Dados Cadastrados</h2>
      <div id="resultado"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
