```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento PetShop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="sidebar">
    <h2><i class="fa-solid fa-paw"></i> PetShop</h2>

    <ul>
      <li><i class="fa-solid fa-house"></i> Dashboard</li>
      <li><i class="fa-solid fa-user"></i> Clientes</li>
      <li><i class="fa-solid fa-dog"></i> Pets</li>
      <li><i class="fa-solid fa-calendar"></i> Agendamentos</li>
      <li><i class="fa-solid fa-scissors"></i> Serviços</li>
      <li><i class="fa-solid fa-money-bill"></i> Pagamentos</li>
      <li><i class="fa-solid fa-chart-line"></i> Relatórios</li>
    </ul>
  </div>

  <div class="main-content">
    <div class="header">
      <h1><i class="fa-solid fa-paw"></i> Painel de Gerenciamento</h1>
      <button id="logoutBtn">Sair</button>
    </div>

    <div class="cards">
      <div class="card">
        <i class="fa-solid fa-user"></i>
        <h3>Clientes</h3>
        <input type="text" placeholder="Nome do cliente">
        <input type="text" placeholder="Telefone">
        <button>Salvar Cliente</button>
      </div>

      <div class="card">
        <i class="fa-solid fa-dog"></i>
        <h3>Pets</h3>
        <input type="text" placeholder="Nome do pet">
        <input type="text" placeholder="Raça">
        <button>Salvar Pet</button>
      </div>

      <div class="card">
        <i class="fa-solid fa-calendar-check"></i>
        <h3>Agendamentos</h3>
        <input type="date">
        <input type="time">
        <button>Salvar Agendamento</button>
      </div>

      <div class="card">
        <i class="fa-solid fa-money-bill-wave"></i>
        <h3>Pagamentos</h3>
        <input type="text" placeholder="Valor do serviço">
        <input type="text" placeholder="Forma de pagamento">
        <button>Salvar Pagamento</button>
      </div>
    </div>

    <div class="card" style="margin-top: 30px;">
      <h3><i class="fa-solid fa-list"></i> Dados Salvos</h3>
      <p>Aqui você poderá mostrar futuramente os dados cadastrados no sistema.</p>

      <div id="listaClientes"></div>
      <div id="listaPets"></div>
      <div id="listaAgendamentos"></div>
      <div id="listaPagamentos"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
```
