<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pets - PetShop Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="pagina-container">
    <header class="topo-pagina">
      <h1>Pets Cadastrados</h1>
      <a href="gerenciamento.html" class="btn-voltar">Voltar ao Dashboard</a>
    </header>

    <section class="lista-pets">
      <div id="petsContainer"></div>
    </section>
  </div>

  <script>
document.addEventListener('DOMContentLoaded', () => {

  const petsContainer = document.getElementById('petsContainer');

  let pets = JSON.parse(localStorage.getItem('petshopDados')) || [];

  if (!Array.isArray(pets)) {
    pets = [pets];
  }

  if (pets.length === 0) {
    petsContainer.innerHTML = `
      <div class="pet-card vazio">
        <h2>🐾 Nenhum pet cadastrado</h2>
        <p>Cadastre um pet no sistema para visualizá-lo aqui.</p>
      </div>
    `;
    return;
  }

  pets.sort((a, b) =>
    a.petNome.localeCompare(b.petNome)
  );

  petsContainer.innerHTML = `
    <div class="resumo-pets">
      Total de Pets Cadastrados: <strong>${pets.length}</strong>
    </div>
  `;

  pets.forEach(pet => {

    petsContainer.innerHTML += `
      <div class="pet-card">

        <h2>🐶 ${pet.petNome}</h2>

        <p>
          <strong>Tipo:</strong>
          ${pet.petTipo}
        </p>

        <p>
          <strong>Dono:</strong>
          ${pet.clienteNome}
        </p>

        <p>
          <strong>Telefone:</strong>
          ${pet.clienteTelefone}
        </p>

        <p>
          <strong>Serviço:</strong>
          ${pet.servico}
        </p>

        <p>
          <strong>Agendamento:</strong>
          ${pet.agendamentoData}
          às
          ${pet.agendamentoHora}
        </p>

      </div>
    `;
  });

});
</script>

</body>
</html>
