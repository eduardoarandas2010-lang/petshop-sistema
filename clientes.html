<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - PetShop Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="pagina-container">
    <header class="topo-pagina">
      <h1>Clientes Cadastrados</h1>
      <a href="gerenciamento.html" class="btn-voltar">Voltar ao Dashboard</a>
    </header>

    <section class="lista-clientes">
      <div id="clientesContainer"></div>
    </section>
  </div>

  <script>
document.addEventListener('DOMContentLoaded', () => {

  const clientesContainer =
    document.getElementById('clientesContainer');

  let clientes =
    JSON.parse(localStorage.getItem('petshopDados')) || [];

  if (!Array.isArray(clientes)) {
    clientes = [clientes];
  }

  if (clientes.length === 0) {

    clientesContainer.innerHTML = `
      <div class="cliente-card vazio">
        <p>Nenhum cliente cadastrado até o momento.</p>
      </div>
    `;

    return;
  }

  clientes.sort((a, b) =>
    a.clienteNome.localeCompare(b.clienteNome)
  );

  clientesContainer.innerHTML = '';

  clientes.forEach((cliente) => {

    clientesContainer.innerHTML += `
      <div class="cliente-card">

        <h2>${cliente.clienteNome}</h2>

        <p>
          <strong>Telefone:</strong>
          ${cliente.clienteTelefone}
        </p>

        <p>
          <strong>Pet:</strong>
          ${cliente.petNome}
        </p>

        <p>
          <strong>Tipo do Pet:</strong>
          ${cliente.petTipo}
        </p>

        <p>
          <strong>Serviço:</strong>
          ${cliente.servico}
        </p>

        <p>
          <strong>Agendamento:</strong>
          ${cliente.agendamentoData}
          às
          ${cliente.agendamentoHora}
        </p>

        <p>
          <strong>Pagamento:</strong>
          ${cliente.formaPagamento}
        </p>

        <p>
          <strong>Valor:</strong>
          R$ ${cliente.valorPagamento}
        </p>

      </div>
    `;
  });

});
</script>

</body>
</html>
